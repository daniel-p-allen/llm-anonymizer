name: checks

# Two jobs, deliberately kept apart.
#
# `checks` needs nothing beyond Python and is completely deterministic: it either
# passes or something is genuinely wrong.
#
# `tests` builds and runs the C++ unit tests, which means installing SplashKit
# through its own manager rather than a package repository. That is the less
# predictable half, so it is isolated — if the installer upstream ever breaks, the
# failure is visibly its own and `checks` still reports honestly.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: No personal data in the repository
        run: ./scripts/check-pii.sh

      - name: Python retrieval script parses
        run: python -m py_compile src/fetch_emails.py

      - name: Sample data is valid JSON and has the expected shape
        run: |
          python - <<'PY'
          import json, sys

          with open('sample_data.json') as f:
              data = json.load(f)

          assert isinstance(data, list) and data, "sample_data.json must be a non-empty list"

          required = {'from', 'to', 'subject', 'content'}
          for i, entry in enumerate(data):
              missing = required - entry.keys()
              assert not missing, f"entry {i} is missing {missing}"

          print(f"{len(data)} sample emails, all fields present")
          PY

      - name: GUI config is valid JSON
        run: python -c "import json; json.load(open('gui_config.json'))"

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SplashKit's own dependencies. The tests never open a window, so no display
      # server is needed — SplashKit only wants one when a window is actually
      # created, and gui.cpp is not part of the test build.
      - name: Install SplashKit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl git build-essential clang libcurl4-openssl-dev

      - name: Cache SplashKit
        id: cache-splashkit
        uses: actions/cache@v4
        with:
          path: ~/.splashkit
          key: splashkit-${{ runner.os }}-v1

      - name: Install SplashKit
        if: steps.cache-splashkit.outputs.cache-hit != 'true'
        run: |
          curl -s https://raw.githubusercontent.com/splashkit/skm/master/install-scripts/skm-install.sh | bash

      # The installer appends to ~/.bashrc, which a non-interactive job never
      # reads, so put skm on the path explicitly for the steps that follow.
      - name: Put skm on the path
        run: echo "$HOME/.splashkit" >> $GITHUB_PATH

      - name: Install the SplashKit libraries
        run: skm install || skm update

      - name: Unit tests
        run: make test
